<!-- CONTENT -->
<main class="content-area">

  <div class="container py-5">

    <div *ngIf="learningPaths.length > 0; else noResults">

      <div class="row g-4">

        <div class="col-lg-6 col-xl-4"
             *ngFor="let lp of learningPaths">

          <div class="card recommendation-card h-100 border-0 shadow-sm">

            <!-- CARD HEADER -->
            <div class="card-header bg-white border-0 pb-0">

              <div class="d-flex justify-content-between align-items-start">

                <h5 class="fw-bold text-dark">
                  {{ lp.title }}
                </h5>

                <span class="badge bg-primary rounded-pill">
                  {{ lp.level }}
                </span>

              </div>

              <div class="mt-2">

                <span class="badge bg-light text-dark me-2">
                  {{ lp.domain }}
                </span>

                <span class="badge bg-secondary">
                  {{ lp.language }}
                </span>

              </div>

            </div>

            <!-- CARD BODY -->
            <div class="card-body">

              <h6 class="fw-bold mb-3">
                Ressources
              </h6>

              <div class="resource-box"
                   *ngFor="let r of lp.resources">

                <div class="d-flex align-items-center mb-2">

                  <i class="fa fa-book text-primary me-2"></i>

                  <span class="fw-semibold">
                    {{ r.name }}
                  </span>

                </div>

                <span class="badge bg-info mb-2">
                  {{ r.type }}
                </span>

                <div>
                  <a [href]="r.url"
                     target="_blank"
                     class="resource-link">

                    Accéder à la ressource

                    <i class="fa fa-external-link ms-1"></i>

                  </a>
                </div>

              </div>

            </div>


          </div>

        </div>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <ng-template #noResults>

      <div class="empty-state shadow-sm">

        <i class="fa fa-search fa-3x mb-3 text-primary"></i>

        <h4>Aucune recommandation trouvée</h4>

        <p class="text-muted">
          Essayez avec un autre profil utilisateur.
        </p>

      </div>

    </ng-template>

  </div>

</main>
