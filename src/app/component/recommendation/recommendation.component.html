<div class="container my-4">
  <div *ngIf="learningPaths.length > 0; else noResults" class="table-responsive mt-5 shadow-sm p-3 rounded-3">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th scope="col">Titre</th>
        <th scope="col">Langue</th>
        <th scope="col">Niveau</th>
        <th scope="col">Domaine</th>
        <th scope="col">Ressources</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let lp of learningPaths">
        <td class="fw-semibold">{{ lp.title }}</td>
        <td>{{ lp.language | languageLabel }}</td>
        <td>{{ lp.level }}</td>
        <td>{{ lp.domain }}</td>
        <td>
          <ng-container *ngFor="let r of lp.resources">
            <div class="mb-2">
              <span class="fw-bold">Nom : </span> {{ r.name }} <br>
              <span class="fw-bold">Type : </span>
              <span class="badge bg-primary">{{ r.type }}</span> <br>
              <span class="fw-bold">URL : </span>
              <a [href]="r.url" target="_blank" rel="noopener noreferrer">{{ r.url }}</a>
              <div class="mt-2">
                <button
                  [hidden]="!localAuthStatus"
                  (click)="terminerCours(lp.id)"
                  class="btn btn-success btn-sm shadow-sm rounded-pill">Terminer le cours
                </button>
              </div>
            </div>
            <hr *ngIf="lp.resources.length > 1 && r !== lp.resources[lp.resources.length-1]">
          </ng-container>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noResults>
    <div class="alert alert-info mt-4" role="alert">
      Aucun parcours trouvé. Essayez avec un autre nom d'utilisateur.
    </div>
  </ng-template>
</div>
