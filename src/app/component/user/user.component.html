<div class="container my-2">
  <form [formGroup]="userForm" (ngSubmit)="submitUserForm()" class="card p-4 shadow-sm rounded-3">
    <div class="row g-3 align-items-end">

      <!-- Username -->
      <div class="col-12 col-md-4">
        <label for="username" class="form-label fw-bold">Nom d'utilisateur *</label>
        <input type="text" id="username" formControlName="username" class="form-control" placeholder="Entrez un nom d'utilisateur">
      </div>

      <!-- Password -->
      <div class="col-12 col-md-4">
        <label for="password" class="form-label fw-bold">Mot de passe *</label>
        <input type="password" id="password" formControlName="password" class="form-control" placeholder="Entrez votre mot de passe">
      </div>

      <!-- Level -->
      <div class="col-12 col-md-4">
        <label for="level" class="form-label fw-bold">Niveau *</label>
        <select id="level" class="form-select" formControlName="level">
          <option value="">Sélectionnez un niveau</option>
          <option value="Débutant">Débutant</option>
          <option value="Intermédiaire">Intermédiaire</option>
          <option value="Avancé">Avancé</option>
          <option value="Expert">Expert</option>
        </select>
      </div>

      <!-- Domain -->
      <div class="col-12 col-md-4">
        <label for="domain" class="form-label fw-bold">Domaine *</label>
        <select id="domain" formControlName="domain" class="form-select">
          <option *ngFor="let d of domains" value="{{d}}">{{d}}</option>
        </select>
      </div>

      <!-- Langue -->
      <div class="col-12 col-md-4">
        <label for="language" class="form-label fw-bold">Langue *</label>
        <select id="language" formControlName="language" class="form-select">
          <option value="">Sélectionnez une langue</option>
          <option value="fr">Français</option>
          <option value="en">Anglais</option>
        </select>
      </div>

      <!-- Submit -->
      <div class="col-auto">
        <button type="submit" class="btn btn-success px-4">Enregistrer</button>
      </div>

    </div>
  </form>

  <!-- Table des utilisateurs -->
  <div *ngIf="userDtos.length > 0; else noUsers" class="table-responsive mt-5 shadow-sm p-3 rounded-3">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-light">
      <tr>
        <th scope="col">Nom d'utilisateur</th>
        <th scope="col">Niveau</th>
        <th scope="col">Domaine</th>
        <th scope="col">Langue</th>
        <th scope="col">Cours suivis</th>
        <th scope="col">Tags</th>
        <!--<th>Action</th>-->
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let u of userDtos | paginate : { itemsPerPage: pageSize, currentPage: page, totalItems: count }">
        <td class="fw-semibold">{{ u.username }}</td>
        <td>{{ u.level }}</td>
        <td>{{ u.domain }}</td>
        <td>{{ u.language }}</td>
        <td>
          <ng-container *ngFor="let course of u.completedLearningPath; let last = last">
            <span class="badge bg-secondary me-1">{{ course.title }}</span>
          </ng-container>
        </td>
        <td>
          <ng-container *ngFor="let course of u.completedLearningPath; let last = last">
            <ng-container *ngFor="let tag of course.tags; let last = last">
              <span class="badge bg-info text-dark me-1">{{tag}}</span>
            </ng-container>
          </ng-container>
        </td>
        <!--<td><button type="button" class="btn btn-primary" (click)="updateUser(u.id)"><i class="fa fa-edit"></i></button></td>-->
      </tr>
      </tbody>
    </table>
    <div class="col-md-12 text-center mt-3">
      <pagination-controls previousLabel="Précédent" nextLabel="Suivant" [responsive]="true" (pageChange)="handlePageChange($event)"></pagination-controls>
    </div>
  </div>

  <!-- Aucun utilisateur -->
  <ng-template #noUsers>
    <div class="alert alert-info mt-4" role="alert">
      Aucun utilisateur trouvé. Ajoutez-en un via le formulaire.
    </div>
  </ng-template>
</div>
